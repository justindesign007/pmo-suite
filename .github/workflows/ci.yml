name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check whitespace
        run: git diff --check

      - name: Smoke test server
        run: |
          PMO_DB_PATH=/tmp/pmo-suite-ci.sqlite PORT=3100 npm run start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          sleep 2
          node -e "const health = await fetch('http://127.0.0.1:3100/api/health').then(r => r.json()); if (!health.ok) process.exit(1);"

      - name: Build Docker image
        run: docker build -t pmo-suite-ci .
